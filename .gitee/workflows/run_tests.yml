name: Run Pytest

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # 使用官方推荐的 v3 版本[reference:6]
      - name: Set up Python
        uses: actions/setup-python@v3 # 使用官方推荐的 v3 版本
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest requests pytest-html python-dotenv tenacity
      - name: Run tests
        run: |
          pytest test_login_token.py --html=report.html --self-contained-html
      # 注意：为提升稳定性，此处暂时移除了报告上传步骤